name: 📖 Build & Sign PDFs

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'PDF build mode'
        required: true
        default: 'light'
        type: choice
        options:
          - light
          - dark
          - both
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "scripts/**"
      - ".github/workflows/**"

permissions:
  contents: write
  id-token: write

jobs:
  build-sign-release:
    name: Build, Sign & Release PDFs
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: 📦 Install MkDocs Material
        run: pip install mkdocs-material

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: 120
          install-dependencies: true
          install-chromedriver: true

      - name: 🔑 Install GPG tools
        run: |
          sudo apt-get update
          sudo apt-get install gnupg

      - name: 🖨️ Build PDFs
        env:
          CI: true
        run: python scripts/build_guide_pdf.py --${{ inputs.build_mode || 'both' }}

      # - name: 🛡️ Hash/Sign PDFs
      #   env:
      #     GPG_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      #     GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}                # I'm just gonna do this locally because GPG signing in CI
        run: |                                                         # is a pain and I don't want to deal with it right now.
      #     cd ${{ github.workspace }}
      #     # Import GPG key
      #     export GPG_TTY=$(tty)
      #     echo "$GPG_KEY" | gpg --batch --import 2>/dev/null || true
          chmod +x scripts/sign-pdfs.sh
          ./scripts/sign-pdfs.sh

      - name: 🦠 Upload PDFs to VirusTotal
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            export/thgtoa.pdf
            export/thgtoa-dark.pdf

      - name: 📊 Extract VT scan results
        id: vt-scan
        run: |
          echo "status=completed" >> $GITHUB_OUTPUT

      - name: 🔗 Generate VT report links
        run: |
          # Create a markdown file with VT scan results and links
          cat > export/virus-total-results.md << EOF
          ## VirusTotal Scan Results

          **Scan Date:** \$(date -u +"%Y-%m-%d %H:%M UTC")

          ### thgtoa.pdf (Light Mode)
          - **VT Report:** https://www.virustotal.com/gui/file/\$(sha256sum export/thgtoa.pdf | cut -d' ' -f1)

          ### thgtoa-dark.pdf (Dark Mode) (currently broken)
          - **VT Report:** https://www.virustotal.com/gui/file/\$(sha256sum export/thgtoa-dark.pdf | cut -d' ' -f1)

          ---
          *Scan performed automatically by GitHub Actions*
          EOF

      - name: 📤 Upload export directory as artifact
        uses: actions/upload-artifact@v4
        with:
          name: export
          path: |
            export/*
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
